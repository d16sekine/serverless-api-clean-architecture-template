service: serverless-api-clean-architecture

frameworkVersion: '4'

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-northeast-1'}
  stage: ${opt:stage, 'dev'}
  timeout: 30
  environment:
    ENV_SAMPLE: ${env:ENV_SAMPLE, 'default_value'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

plugins:
  - serverless-esbuild
  - serverless-offline

functions:
  hello:
    handler: src/handlers/hello.handler
    events:
      - http:
          path: /hello
          method: get
          cors: true
  # Todo リソースは単一 Lambda（lambdalith）で受け、内部ルーターで振り分ける。
  # これにより InMemoryTodoRepository の状態が全ルートで共有される。
  todos:
    handler: src/handlers/todos/index.handler
    events:
      - http:
          path: /todos
          method: post
          cors: true
      - http:
          path: /todos
          method: get
          cors: true
      - http:
          path: /todos/{id}
          method: get
          cors: true
      - http:
          path: /todos/{id}/complete
          method: patch
          cors: true

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    exclude: ['aws-sdk']
    target: 'node20'
    define:
      'require.resolve': undefined
  serverless-offline:
    httpPort: 3000
    stage: ${self:provider.stage}
